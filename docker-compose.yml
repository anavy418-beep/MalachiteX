services:
  postgres:
    image: postgres:16
    container_name: p2p-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: p2p_mvp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: p2p-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: p2p-api
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - "4000:4000"
    volumes:
      - ./:/app
      - /app/node_modules

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: p2p-web
    depends_on:
      - api
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
